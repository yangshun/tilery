packages:
  - 'packages/*'
  - 'apps/*'

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

catalog:
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  react: ^19.2.7
  react-dom: ^19.2.7
  typescript: ^7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vitest: 4.1.10
  vite-plus: 0.2.4
  '@vitest/coverage-v8': 4.1.10

allowBuilds:
  sharp: false
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    typescript: '>=7'
    vite: '*'
    vitest: '*'
